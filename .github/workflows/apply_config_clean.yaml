name: Apply clean configuration patch

on:
  pull_request:
    branches:
      - fix/04-runtime-reliability-final

permissions:
  contents: write

jobs:
  apply-config:
    if: github.head_ref == 'fix/05-config-release-clean'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed configuration files
        run: |
          git fetch origin fix/05-config-release
          git checkout origin/fix/05-config-release -- \
            custom_components/grouw_ble_mower/config_flow.py \
            custom_components/grouw_ble_mower/diagnostics.py \
            custom_components/grouw_ble_mower/manifest.json \
            custom_components/grouw_ble_mower/strings.json \
            custom_components/grouw_ble_mower/translations/da.json \
            custom_components/grouw_ble_mower/translations/en.json \
            custom_components/grouw_ble_mower/translations/sv.json \
            tests/test_config_flow.py
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
          pytest -q -p no:cacheprovider
          python -m compileall -q custom_components/grouw_ble_mower tests
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: verify mower configuration before saving"
          git push origin HEAD:${{ github.head_ref }}
