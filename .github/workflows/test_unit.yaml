name: Apply prepared configuration patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-prepared-patch:
    if: github.head_ref == 'fix/05-config-release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and validate prepared patch
        run: |
          base64 -d automation_patch.gz.b64 | gzip -d > config-release.patch
          git apply --exclude=.github/workflows/test_unit.yaml config-release.patch
          rm automation_patch.gz.b64 config-release.patch
          cat > .github/workflows/test_unit.yaml <<'EOF'
          name: Run unit tests

          on:
            push:
            pull_request:

          permissions:
            contents: read

          jobs:
            run-tests:
              name: Run unit tests
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.13"
                    cache: pip
                    cache-dependency-path: requirements-test.txt

                - name: Install test dependencies
                  run: |
                    python -m pip install --upgrade pip
                    python -m pip install -r requirements-test.txt

                - name: Run pytest
                  run: pytest -q -p no:cacheprovider

                - name: Compile Python files
                  run: python -m compileall -q custom_components/grouw_ble_mower tests
          EOF
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
          pytest -q -p no:cacheprovider
          python -m compileall -q custom_components/grouw_ble_mower tests
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: verify configuration and pin release inputs"
          git push origin HEAD:${{ github.head_ref }}
