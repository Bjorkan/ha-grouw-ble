name: Apply prepared configuration patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-prepared-patch:
    if: github.head_ref == 'fix/05-config-release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and validate prepared patch
        run: |
          set -o pipefail
          base64 -d automation_patch.gz.b64 | gzip -d > config-release.patch
          git apply --exclude='.github/workflows/*' config-release.patch
          rm automation_patch.gz.b64 config-release.patch
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
          pytest -q -p no:cacheprovider
          python -m compileall -q custom_components/grouw_ble_mower tests
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: verify configuration and pin release inputs"
          git push origin HEAD:${{ github.head_ref }}
