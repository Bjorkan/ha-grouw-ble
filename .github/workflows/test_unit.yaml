name: Run unit tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-prepared-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/04-runtime-reliability'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and validate prepared patch
        run: |
          set -o pipefail
          base64 -d automation_patch.gz.b64 | gzip -d > runtime.patch
          git apply runtime.patch 2>&1 | tee automation-validation.log
          rm automation_patch.gz.b64 runtime.patch
          python -m pip install --upgrade pip 2>&1 | tee -a automation-validation.log
          python -m pip install -r requirements-test.txt 2>&1 | tee -a automation-validation.log
          pytest -q -p no:cacheprovider 2>&1 | tee -a automation-validation.log
          python -m compileall -q custom_components/grouw_ble_mower tests 2>&1 | tee -a automation-validation.log
          rm automation-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden runtime command and proxy handling"
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-patch-validation
          path: automation-validation.log
          if-no-files-found: ignore

  run-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest -q -p no:cacheprovider

      - name: Compile Python files
        run: python -m compileall -q custom_components/grouw_ble_mower tests
